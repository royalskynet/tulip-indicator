# 鬱金香指標 (TI) 機讀規格 v2.0
# 計分：代理對自身歷史窗取百分位(0-100,泡沫極端=高) -> 機制均值 -> raw加權和 -> display顯示刻度
# 缺值：剔除該代理、機制對可得代理重新正規化、旗標unverified；機制不憑空補值
# 禁止：用記憶舊值/推測補值；為命中歷史而調權重

meta:
  version: "2.0"
  scale: "0-100；100 = 內生泡沫破滅傳導正在發生"
  scope: "僅內生泡沫破滅。外生衝擊(SARS/開戰/天災)不在範圍，無 override"
  stateful: true
  bonus: none

formula:
  proxy:     "score_p = percentile_rank(transform(v_p), H_p) * 100"
  mechanism: "M_i = mean(可得 score_p)"
  raw:       "raw = Σ(w_i * M_i)  (缺機制則對可得權重重新正規化)"
  display:   "TI = display(raw)"

windows:
  market_daily: "504-756 交易日 (2-3年)"
  quarterly:    "8-12 季"
  flow_monthly: "24-36 個月"
  bootstrap:    "自存歷史不足時以外部歷史序列補窗並旗標 bootstrapped=true"

# ---- 顯示刻度：顯示90 = 內部raw70 = 引信備妥/危險線 ----
display_transform:
  rule_low:  "raw <= 70 : display = raw * 90/70"
  rule_high: "raw  > 70 : display = 90 + (raw-70)/3"
  intent: "危險線推到直覺的90；raw70-100的脈衝段壓進display90-100。raw與display同時存檔"

# ---- 七機制 (2026權重；隨時代浮動見 METHODOLOGY §8) ----
mechanisms:
  M1:
    name: 信貸計價(影子銀行錯配)
    weight_2026: 0.25
    role: 領頭+脈衝源
    proxies:
      - {id: hy_oas,           transform: level,             direction: high_is_bubble, window: market_daily,
         fetch: {primary_url: "https://fred.stlouisfed.org/series/BAMLH0A0HYM2", search: "high yield OAS BAMLH0A0HYM2 latest"}}
      - {id: hy_ig,            transform: "BAMLH0A0HYM2-BAMLC0A0CM", direction: high_is_bubble, window: market_daily,
         fetch: {primary_url: "https://fred.stlouisfed.org/series/BAMLC0A0CM", search: "IG corporate OAS latest"}}
      - {id: bdc_navdisc_gate, transform: "discount_pct + gate_flag", direction: high_discount_is_bubble, window: market_daily,
         fetch: {search: "MVIS BDC index price to NAV discount latest; BDC redemption gate"}}
  M2:
    name: 資本支出轉折(實體產能)
    weight_2026: 0.18
    role: "領頭；慢錨定方向、快代理定時點；兩者背離=最強頂部訊號"
    proxies:
      - {id: hyperscaler_capex_trigger_x_gate,
         scope: "MSFT+GOOGL+AMZN+META 合計(不含Apple)",
         transform: "percentile(capex_YoY二階導向下) * gate(percentile(capex/OCF))",
         direction: "增速轉折向下 + capex/OCF高 = bubble", window: quarterly,
         fetch: {search: "Microsoft Alphabet Amazon Meta capex Q{n} {year} operating cash flow", field: "現金流量表 capex / OCF"},
         note: "扳機=二階導轉折(主)；放大器=capex/OCF自身百分位。靠FCF養的降速良性,靠舉債養的降速致命"}
      - {id: ai_credit_fast,
         transform: "issuance_pace + spread RoC; GPU租價趨勢",
         direction: "發行降速+利差走闊=bubble; 發行火爆+利差收斂=仍在吹", window: market_daily,
         fetch: {search: "AI data center high yield bond issuance spread latest; GPU rental price"}}
  M3:
    name: 邊際買家枯竭(新錢入口)
    weight_2026: 0.14
    role: 領頭
    proxies:
      - {id: ipo_withdrawal_rate, transform: "撤回/流標率(單調)", direction: high_is_bubble, window: flow_monthly,
         fetch: {primary_url: "https://stockanalysis.com/ipos/withdrawn/", search: "IPO withdrawn pulled {month} {year}"},
         note: "首日暴漲不放這裡(屬吹大,移M7)避免抵銷"}
      - {id: inflow_decel, transform: "BTC ETF + 廣基股票ETF 淨流入動能(RoC)", direction: "減速/轉負=bubble", window: flow_monthly,
         fetch: {search: "spot bitcoin ETF net flows latest; US equity ETF net inflows latest"}}
  M4:
    name: 槓桿/信用擴張
    weight_2026: 0.10
    role: "嚴重度放大器(非計時器)"
    proxies:
      - {id: margin_debt_yoy, transform: yoy_pct, direction: high_is_bubble, window: market_daily,
         fetch: {primary_url: "https://www.finra.org/rules-guidance/key-topics/margin-accounts/margin-statistics", search: "FINRA margin debt YoY latest"}}
      - {id: ai_debt_growth, transform: growth_rate, direction: high_is_bubble, window: flow_monthly,
         fetch: {search: "AI data center debt outstanding growth; leveraged loan issuance latest"}}
  M5:
    name: 集中度/偽分散
    weight_2026: 0.10
    role: 嚴重度/結構
    proxies:
      - {id: mag7_share, transform: level, direction: high_is_bubble, window: market_daily,
         fetch: {search: "Magnificent 7 share of S&P 500 market cap latest"}}
      - {id: xasset_corr, transform: "rolling corr(債券/其他, 科技複合體)", direction: "相關升高(偽分散)=bubble", window: market_daily,
         fetch: {search: "bond equity correlation tech AI latest"}}
  M6:
    name: 結構確認(同步點火)
    weight_2026: 0.15
    role: "脈衝源/確認(非override)"
    proxies:
      - {id: breadth_200dma, transform: level, direction: low_is_bubble, window: market_daily,
         fetch: {primary_url: "https://www.barchart.com/stocks/quotes/$S5TH", search: "S&P 500 percent above 200 day moving average latest"}}
      - {id: vix_term, transform: "VIX/VIX3M (>1倒掛)", direction: "倒掛=確認", window: market_daily,
         fetch: {primary_url: "https://vixcentral.com/", search: "VIX VIX3M ratio latest"}}
      - {id: drawdown_ath, transform: "drawdown% from ATH", direction: "越深越接近確認", window: market_daily,
         fetch: {search: "S&P 500 drawdown from all time high latest"}}
  M7:
    name: 情緒/全民化
    weight_2026: 0.08
    role: "油表(最晚最吵)"
    proxies:
      - {id: ipo_first_day_pop_fomo, transform: "IPO首日漲幅中位數/散戶FOMO", direction: high_is_bubble, window: flow_monthly,
         fetch: {search: "IPO first day pop median {year}; retail FOMO"}}
      - {id: us_sentiment_positioning, transform: "BofA經理人現金/超配 + AAII配置 + 0DTE量 合成", direction: high_is_bubble, window: flow_monthly,
         fetch: {search: "BofA fund manager survey cash equity overweight latest; AAII allocation; 0DTE volume"}}

# ---- 三組(對外摘要層；七機制底層不變) ----
groups:
  放大器_乾柴多高:   {members: [M4,M5,M7], reads: "結構多脆,爆了多慘(可盤旋數年)"}
  領先引信_火星點了沒: {members: [M1,M2,M3], reads: "領先轉折是否開始,這組才是計時器"}
  確認_燒起來沒:     {members: [M6],       reads: "災難是否正在傳導,亮即90->100那一哩"}

# ---- 區間 (顯示刻度) ----
bands:
  - {range: [0,50],   state: 平靜,          action: "正常配置,每月查"}
  - {range: [50,75],  state: 累積,          action: "停止加碼風險,壓力測試組合扛-35%"}
  - {range: [75,90],  state: 警戒/逐步退場,  action: "主動退場窗口,流動性還在,目標90前退完,改週查"}
  - {range: [90,100], state: 進行中/太晚,    action: "脈衝/cascade,控損,不在底部被迫賣"}
pulse_note: "顯示90-100=幾天的脈衝。勿把跳傘設在90;理想75起分批退、90前退完"
transition_rule: "連續兩期同區間或更高才確認遷移;單期跳區先標待確認"

history_schema:
  required: [date, TI_display, TI_raw, state, M1,M2,M3,M4,M5,M6,M7, 三組分..., "<mech>.<proxy>原始百分位...", unverified, note]

falsification:
  clean_refs: [2000_dotcom, 2008_gfc]
  partial_refs: [2020_covid_partly_exogenous, 2022_rate_repricing_atypical]
  test: "每代理在它該反應的泡沫是否有動?沉默且不該沉默=壞代理,修。嚴禁為命中歷史調w_i"

weight_floats_by_era:
  rule: "機制槽不動,權重隨主導泡沫結構重評"
  example_M2_capex: {ai_2026: 0.18, fiber_2000: high, housing_2008: "中(代理換營建)", crypto_2021: 0.05}

# 大躍進指標（GLI）機讀規格 v1.0
# score: 0=綠 1=黃 2=紅；判定不明計 0 並標註「未驗證」
# fetch: 直接可用的搜尋/查詢指令

meta:
  version: "1.0"
  created: "2026-06-10"
  scoring: "GLI = min(100, 0.20*A + 0.30*B + 0.30*C + 0.20*D + bonus)"

layers:
  A:
    name: 真實倉位層
    weight: 0.20
    max_points: 10
    indicators:
      - id: A1
        name: NAAIM 主動經理人曝險指數
        fetch: "搜尋 NAAIM Exposure Index latest，來源 naaim.org"
        yellow: ">90 持續四週"
        red: "四週內從 >90 降至 <60"
      - id: A2
        name: AAII 資產配置調查
        fetch: "搜尋 AAII asset allocation survey latest stock allocation；另查 AAII sentiment survey bearish %"
        yellow: "股票配置 >70%"
        red: "股票 >70% 且現金 <15% 且情緒調查空頭 >40%（言行背離）"
      - id: A3
        name: BofA 基金經理人調查現金水位
        fetch: "搜尋 BofA Global Fund Manager Survey cash level latest"
        yellow: "<4%"
        red: "單月自 <4% 跳升 >0.5pp"
      - id: A4
        name: FINRA 保證金債務年增率
        fetch: "搜尋 FINRA margin statistics latest，或 finra.org margin debt 最新月份，計算 YoY"
        yellow: "YoY > +25%"
        red: "YoY 由正轉負"
      - id: A5
        name: 台股融資餘額
        fetch: "搜尋 台股 融資餘額 最新（證交所/玩股網/財經媒體），取近兩週變化與加權指數位置"
        yellow: "創高且增速 > 大盤漲速"
        red: "大盤距高點 <5% 但融資餘額連兩週下降"

  B:
    name: 邊緣流動性層
    weight: 0.30
    max_points: 8
    indicators:
      - id: B1
        name: 無獲利科技股相對表現
        fetch: "查 ARKK 與 SPY 近三個月走勢，計算比值方向；SPY 是否創新高"
        yellow: "ARKK/SPY 比值見頂回落而 SPY 續創新高"
        red: "背離持續 >2 個月"
      - id: B2
        name: 加密風險偏好
        fetch: "查 BTC dominance 近一月走勢 + 主要山寨幣（ETH/SOL 及中小市值）表現"
        yellow: "BTC.D 上升且山寨普跌"
        red: "該狀態持續 >1 個月"
      - id: B3
        name: 一級市場流標
        fetch: "搜尋 IPO withdrawn this month 與 junk bond deal pulled，統計當月件數"
        yellow: "當月 1 起"
        red: "當月 ≥3 起"
      - id: B4
        name: 台股全民化
        fetch: "搜尋 台股 當沖佔比 最新 與 證券 新開戶數 最新月份"
        yellow: "當沖 >40% 或 新開戶數創高（擇一）"
        red: "兩者同時成立"

  C:
    name: 信貸傳導層
    weight: 0.30
    max_points: 6
    indicators:
      - id: C1
        name: 高收益利差 HY OAS
        fetch: "查 FRED BAMLH0A0HYM2 最新值與近四週走勢"
        yellow: ">400bp"
        red: ">500bp 且四週不回落"
        baseline_2026_06: "約 285bp（綠）"
      - id: C2
        name: AI 基建融資鏈壓力
        fetch: "搜尋 CoreWeave refinancing / AI data center debt / hyperscaler bond spread 最新新聞與評級動態"
        yellow: "利差明顯走闊或評級展望轉負"
        red: "任一大型借款方再融資失敗或債務重組"
      - id: C3
        name: BDC 對 NAV 折價
        fetch: "搜尋 BDC price to NAV discount average latest"
        yellow: "折價 >10%"
        red: "折價 >15% 且持續擴大"

  D:
    name: 結構與實體確認層
    weight: 0.20
    max_points: 6
    indicators:
      - id: D1
        name: 標普500 站上 200 日線比例
        fetch: "搜尋 S&P 500 percent of stocks above 200 day moving average latest"
        yellow: "<50%"
        red: "<40% 且指數距歷史高點 <5%"
      - id: D2
        name: VIX 期限結構
        fetch: "查 VIX 與 VIX3M 現值，判斷是否倒掛及持續天數"
        yellow: "VIX > VIX3M 出現"
        red: "倒掛持續 ≥3 個交易日"
      - id: D3
        name: 初領失業金四週均值
        fetch: "查 FRED ICSA 最新四週移動平均"
        yellow: ">260k"
        red: ">300k 且趨勢向上"

bonus:
  - condition: "A1==2 AND C1>=1"
    points: 10
    note: "聰明錢撤 + 信貸計價，歷史最強晚期訊號"
  - condition: "A2==2 AND any(B)==2"
    points: 5
    note: "言行背離 + 邊緣資產先死"
  - condition: "C2==2"
    points: 8
    note: "AI 融資鏈斷裂，本輪特有引信"
  - condition: "B3==2"
    points: 5
    note: "買家沒出現（鬱金香時刻）"

bands:
  - range: [0, 20]
    state: 平靜
    timeframe: 無法估計
  - range: [20, 40]
    state: 累積期
    timeframe: 通常 >12 個月，背景條件已備（歷史類比 n≤5）
  - range: [40, 60]
    state: 引信備妥
    timeframe: 歷史上多在 6–18 個月內峰頂（n≤5）
  - range: [60, 80]
    state: 點火
    timeframe: 歷史上多在 1–6 個月內峰頂或已過峰（n≤5）
  - range: [80, 100]
    state: 進行中
    timeframe: 非預測，為現況描述

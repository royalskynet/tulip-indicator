# 鬱金香指標（TI）機讀規格 v1.1
# score: 0=綠 1=黃 2=紅；判定不明計 0 並標註「未驗證」
# fetch: 結構化抓取指引（primary_url → search_query → 標未驗證）

meta:
  version: "1.1"
  created: "2026-06-10"
  updated: "2026-06-15"
  scoring: "TI = min(100, 0.20*A + 0.30*B + 0.30*C + 0.20*D + bonus)"

layers:
  A:
    name: 真實倉位層
    weight: 0.20
    max_points: 10
    indicators:
      - id: A1
        name: NAAIM 主動經理人曝險指數
        fetch:
          primary_url: "https://www.naaim.org/programs/naaim-exposure-index/"
          search_query: "NAAIM exposure index latest"
          data_field: "NAAIM Exposure Number（本週值）"
        yellow: ">90 持續四週"
        red: "四週內從 >90 降至 <60"
      - id: A2
        name: AAII 資產配置調查
        fetch:
          primary_url: "https://www.aaii.com/assetallocationsurvey"
          search_query: "AAII asset allocation survey {Month} {Year} stock allocation"
          data_field: "股票配置%（Stock）、現金配置%（Cash）"
        fetch_secondary:
          - url: "https://www.aaii.com/sentimentsurvey"
            note: "情緒調查空頭%（Bearish），用於判斷言行背離"
        yellow: "股票配置 >70%"
        red: "股票 >70% 且現金 <15% 且情緒調查空頭 >40%（言行背離）"
      - id: A3
        name: BofA 基金經理人調查現金水位
        fetch:
          primary_url: ""
          search_query: "BofA Global Fund Manager Survey cash level {Month} {Year}"
          data_field: "Cash level %（平均現金配置）"
          note: "BofA FMS 無公開 API，以搜尋財經媒體報導為主"
        yellow: "<4%"
        red: "單月自 <4% 跳升 >0.5pp（且方向為回升，見 METHODOLOGY.md A3 補充）"
      - id: A4
        name: FINRA 保證金債務年增率
        fetch:
          primary_url: "https://www.finra.org/rules-guidance/key-topics/margin-accounts/margin-statistics"
          search_query: "FINRA margin debt {Month} {Year} YoY"
          data_field: "Debit Balances in Customers' Securities Margin Accounts（計算 YoY%）"
        yellow: "YoY > +25%"
        red: "YoY 由正轉負"
      - id: A5
        name: 台股融資餘額
        fetch:
          primary_url: "https://www.twse.com.tw/rwd/zh/marginTrading/MI_MARGN?date={YYYYMMDD}&response=json"
          search_query: "台股融資餘額 {YYYY}年{MM}月"
          data_field: "融資買進餘額（本週）、上週數值（比較用）"
          note: "需本週與上週兩筆數值，才能判斷「連兩週」（見 CLAUDE.md A5 執行備注）"
        yellow: "創高且增速 > 大盤漲速"
        red: "大盤距高點 <5% 但融資餘額連兩週下降"

  B:
    name: 邊緣流動性層
    weight: 0.30
    max_points: 8
    indicators:
      - id: B1
        name: 無獲利科技股相對表現
        fetch:
          primary_url: ""
          search_query: "ARKK SPY ratio 3 month performance {Month} {Year}"
          data_field: "ARKK/SPY 比值方向（近三個月）、SPY 是否創新高"
          note: "Yahoo Finance 或 TradingView 查 ARKK、SPY 近三個月走勢"
        yellow: "ARKK/SPY 比值見頂回落而 SPY 續創新高"
        red: "背離持續 >2 個月"
      - id: B2
        name: 加密風險偏好
        fetch:
          primary_url: "https://api.coingecko.com/api/v3/global"
          search_query: "BTC dominance {Month} {Year}"
          data_field: "bitcoin_dominance_percentage（JSON 欄位）"
        yellow: "BTC.D 上升且山寨普跌"
        red: "該狀態持續 >1 個月"
      - id: B3
        name: 一級市場流標
        fetch:
          primary_url: "https://stockanalysis.com/ipos/withdrawn/"
          search_query: "IPO withdrawn pulled {Month} {Year}"
          data_field: "當月撤回 IPO 件數；另搜「junk bond deal pulled {Month} {Year}」統計件數"
        yellow: "當月 ≥1 起"
        red: "當月 ≥3 起"
      - id: B4
        name: 台股全民化指標（當沖佔比＋新開戶數）
        fetch:
          primary_url: "https://www.twse.com.tw/rwd/zh/dayTrading/TWTB4U?date={YYYYMM}01&response=json"
          search_query: "台股當沖佔比 {YYYY}年{MM}月"
          data_field: "當沖成交金額佔總成交金額比率"
          note: "TWSE API，YYYYMM 替換為當月，如 202606"
        fetch_secondary:
          - url: "https://www.twse.com.tw/rwd/zh/afterTrading/FMTQIK?date={YYYYMM}01&response=json"
            note: "大盤成交值，計算當沖比重分母（若 primary URL 比率欄位不含此）"
          - search: "site:tdcc.com.tw 開戶數 {YYYY年MM月}"
            note: "新開戶數（集保結算所月報），無 API，搜尋為主"
        yellow: "當沖 >40% 或 新開戶數創高（擇一）"
        red: "兩者同時成立"

  C:
    name: 信貸傳導層
    weight: 0.30
    max_points: 6
    indicators:
      - id: C1
        name: 高收益利差 HY OAS
        fetch:
          primary_url: "https://fred.stlouisfed.org/series/BAMLH0A0HYM2"
          search_query: "BAMLH0A0HYM2 high yield OAS {Month} {Year}"
          data_field: "ICE BofA US High Yield Index Option-Adjusted Spread（bp）"
        yellow: ">400bp"
        red: ">500bp 且四週不回落"
        baseline_2026_06: "約 285bp（綠）"
      - id: C2
        name: AI 基建融資鏈壓力
        fetch:
          primary_url: ""
          search_query: "CoreWeave AI data center bond credit spread {Month} {Year}"
          data_field: "CoreWeave 5年 CDS 或債券利差（bp）；Oracle/Microsoft IG 利差較年初變化（bp）"
          note: "無公開 API，搜尋財經媒體及評級機構公告"
        yellow: "CoreWeave 5年 CDS >500bp，或 Oracle/Microsoft IG 利差較年初走闊 >30bp，或評級展望轉負（見 METHODOLOGY.md C2 錨點）"
        red: "CoreWeave 5年 CDS >700bp，或任一大型借款方再融資失敗或債務重組"
      - id: C3
        name: BDC 對 NAV 折價
        fetch:
          primary_url: ""
          search_query: "BDC price to NAV discount average {Month} {Year}"
          data_field: "主要 BDC 折/溢價平均值%（如 ARCC、OBDC、BXSL）"
          note: "無集中 API，搜尋財經媒體或 BDC 研究網站"
        yellow: "折價 >10%"
        red: "折價 >15% 且持續擴大"

  D:
    name: 結構與實體確認層
    weight: 0.20
    max_points: 6
    indicators:
      - id: D1
        name: 標普500 站上 200 日線比例
        fetch:
          primary_url: "https://stockcharts.com/freecharts/perf.php?$SPXA200R"
          search_query: "S&P 500 percent stocks above 200 day moving average {Month} {Year}"
          data_field: "$SPXA200R 現值（%）"
        yellow: "<50%"
        red: "<40% 且指數距歷史高點 <5%"
      - id: D2
        name: VIX 期限結構
        fetch:
          primary_url: ""
          search_query: "VIX VIX3M current value {Month} {Year}"
          data_field: "VIX 現值、VIX3M 現值（判斷是否 VIX > VIX3M）"
          note: "Yahoo Finance 查 ^VIX 與 ^VIX3M"
        yellow: "VIX > VIX3M 出現"
        red: "倒掛持續 ≥3 個交易日"
      - id: D3
        name: 初領失業金四週均值
        fetch:
          primary_url: "https://fred.stlouisfed.org/series/IC4WSA"
          search_query: "initial claims 4 week average {Month} {Year} FRED"
          data_field: "4-Week Moving Average of Initial Claims（千人）"
        yellow: ">260k"
        red: ">300k 且趨勢向上"

bonus:
  - condition: "A1==2 AND C1>=1"
    points: 10
    note: "聰明錢撤 + 信貸計價，歷史最強晚期訊號"
  - condition: "A2==2 AND any(B)==2"
    points: 5
    note: "言行背離 + 邊緣資產先死"
  - condition: "C2==2"
    points: 8
    note: "AI 融資鏈斷裂，本輪特有引信"
  - condition: "B3==2"
    points: 5
    note: "買家沒出現（鬱金香時刻）"

bands:
  - range: [0, 20]
    state: 平靜
    timeframe: 無法估計
  - range: [20, 40]
    state: 累積期
    timeframe: 通常 >12 個月，背景條件已備（歷史類比 n≤5）
  - range: [40, 60]
    state: 引信備妥
    timeframe: 歷史上多在 6–18 個月內峰頂（n≤5）
  - range: [60, 80]
    state: 點火
    timeframe: 歷史上多在 1–6 個月內峰頂或已過峰（n≤5）
  - range: [80, 100]
    state: 進行中
    timeframe: 非預測，為現況描述
